name: Kimia Cloud Processor

on:
  workflow_dispatch:

  push:
    paths:
      - "works/**"
      - "kimia_cloud.py"
      - ".github/workflows/kimia.yml"

permissions:
  contents: write

jobs:
  kimia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Kimia processor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python kimia_cloud.py

      - name: Commit generated files
        run: |
          git config --global user.name "Kimia Bot"
          git config --global user.email "kimia-bot@users.noreply.github.com"

          git add translatedworks formulas

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Kimia: process works"
            git push
          fi
