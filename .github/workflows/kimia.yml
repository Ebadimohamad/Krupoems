name: Kimia Translator Pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - 'works/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Kimia translator agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Starting translation..."
          python translator_agent.py
          echo "Finished translation."

      - name: Commit and push changes
        run: |
          git config --global user.name 'Kimia-Bot'
          git config --global user.email 'kimia@kru.org'
          git add translatedworks/
          git commit -m "Automated translation by Kimia" || echo "No changes to commit"
          git push



