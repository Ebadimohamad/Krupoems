name: Kimia Translation Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Translation Agent
        run: |
          python translator_agent.py
        env:
          KIMIA_TOKEN: ${{ secrets.KIMIA_TOKEN }}

