name: Kimia Translator Agent

on:
  workflow_dispatch:
  push:
    paths:
      - "works/**"
      - "translator_agent.py"
      - ".github/workflows/kimia.yml"

permissions:
  contents: write

concurrency:
  group: kimia-translator
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Kimia translator agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-pro
          KIMIA_SLEEP_SECONDS: "2"
        run: |
          python translator_agent.py

      - name: Commit and push if changed
        run: |
          git config user.name "kimia-bot"
          git config user.email "kimia-bot@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Kimia: auto-translate new works"
          git push



